services:
  - type: web
    name: zero-max
    runtime: docker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zero-max-db
          property: connectionString
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
    plan: free

databases:
  - name: zero-max-db
    plan: free
    databaseName: zero_max_db
