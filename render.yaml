services:
  - type: web
    name: zero-max
    runtime: java
    buildCommand: curl -sL https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/3.9.6/apache-maven-3.9.6-bin.tar.gz | tar xz && ./apache-maven-3.9.6/bin/mvn clean package -DskipTests
    startCommand: java -jar target/zero-max-1.0.0.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zero-max-db
          property: connectionString
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
    plan: free

databases:
  - name: zero-max-db
    plan: free
    databaseName: zero_max_db
